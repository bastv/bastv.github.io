name: Fetch Instagram Posts

on:
  schedule:
    # Runs once a day at 06:00 UTC. Adjust as you like (cron syntax).
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch posts from Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          set -e
          FIELDS="id,caption,media_type,media_url,permalink,thumbnail_url,timestamp"
          URL="https://graph.instagram.com/me/media?fields=${FIELDS}&limit=12&access_token=${IG_ACCESS_TOKEN}"

          echo "Fetching posts..."
          RESPONSE=$(curl -s "$URL")

          # Basic sanity check: bail out loudly if Instagram returned an error
          if echo "$RESPONSE" | grep -q '"error"'; then
            echo "Instagram API returned an error:"
            echo "$RESPONSE"
            exit 1
          fi

          mkdir -p data
          echo "$RESPONSE" > data/posts.json
          echo "Saved $(echo "$RESPONSE" | grep -o '"id"' | wc -l) posts to data/posts.json"

      - name: Commit updated posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git diff --staged --quiet || git commit -m "Update Instagram posts feed"
          git push
