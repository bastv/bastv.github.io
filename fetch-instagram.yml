name: Fetch Instagram Posts

on:
  schedule:
    # Runs once a day at 06:00 UTC. Adjust as you like (cron syntax).
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch posts from Instagram
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: |
          set -e
          FIELDS="id,caption,media_type,media_url,permalink,thumbnail_url,timestamp"
          URL="https://graph.instagram.com/me/media?fields=${FIELDS}&limit=100&access_token=${IG_ACCESS_TOKEN}"

          mkdir -p data
          echo '{"data":[]}' > data/posts.json

          PAGE=1
          PREV_URL=""
          MAX_PAGES=20
          while [ -n "$URL" ] && [ "$URL" != "null" ] && [ "$PAGE" -le "$MAX_PAGES" ]; do
            if [ "$URL" == "$PREV_URL" ]; then
              echo "Next-page URL repeated itself, stopping to avoid a loop."
              break
            fi

            echo "Fetching page $PAGE..."
            RESPONSE=$(curl -s "$URL")

            if echo "$RESPONSE" | grep -q '"error"'; then
              echo "Instagram API returned an error:"
              echo "$RESPONSE"
              exit 1
            fi

            # Merge this page's posts into the accumulated file
            echo "$RESPONSE" | jq -c '.data // []' > page.json
            jq -s '{data: (.[0].data + .[1])}' data/posts.json page.json > merged.json
            mv merged.json data/posts.json

            PREV_URL="$URL"
            URL=$(echo "$RESPONSE" | jq -r '.paging.next // empty')
            PAGE=$((PAGE + 1))
          done

          # Deduplicate by post id (order-preserving), then sort newest-first
          # to guarantee it matches the order shown on your Instagram profile
          jq -c '{data: (.data | unique_by(.id) | sort_by(.timestamp) | reverse)}' data/posts.json > deduped.json
          mv deduped.json data/posts.json

          rm -f page.json
          echo "Saved $(jq '.data | length' data/posts.json) posts to data/posts.json"

          # Field-expansion for "children" on the main /media endpoint is
          # unreliable and often comes back empty, so fetch each carousel
          # album's children individually via its own dedicated endpoint.
          CHILD_FIELDS="id,media_type,media_url,thumbnail_url"
          CAROUSEL_IDS=$(jq -r '.data[] | select(.media_type == "CAROUSEL_ALBUM") | .id' data/posts.json)

          for CID in $CAROUSEL_IDS; do
            echo "Fetching children for carousel $CID..."
            CHILD_RESPONSE=$(curl -s "https://graph.instagram.com/${CID}/children?fields=${CHILD_FIELDS}&access_token=${IG_ACCESS_TOKEN}")

            if echo "$CHILD_RESPONSE" | grep -q '"error"'; then
              echo "Warning: failed to fetch children for $CID, leaving it without children"
              echo "$CHILD_RESPONSE"
              continue
            fi

            # Inject the fetched children into the matching post in posts.json
            echo "$CHILD_RESPONSE" > child.json
            jq --arg cid "$CID" --slurpfile child child.json '
              .data |= map(if .id == $cid then .children = $child[0] else . end)
            ' data/posts.json > updated.json
            mv updated.json data/posts.json
          done

          rm -f child.json
          echo "Done fetching carousel children."

      - name: Commit updated posts.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/posts.json
          git diff --staged --quiet || git commit -m "Update Instagram posts feed"
          git pull --rebase origin main
          git push
