<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Instagram Feed</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      background: #000;
      color: #d4d4d4;
    }
    h1 {
      text-align: left;
      font-weight: 600;
      color: #f0f0f0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 30px;
    }
    .post {
      position: relative;
      background: #111;
      border: 1px solid #262626;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .post:hover {
      transform: translateY(-3px);
      border-color: #444;
    }
    .post img, .post video {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }
    .caption {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 12px;
      font-size: 0.85rem;
      line-height: 1.3;
      color: #f0f0f0;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.4) 50%, rgba(0,0,0,0) 100%);
      opacity: 0;
      transition: opacity 0.2s ease;
      overflow: hidden;
      pointer-events: none;
    }
    .post:hover .caption {
      opacity: 1;
    }
    .status {
      text-align: center;
      color: #888;
      margin-top: 40px;
    }
    .play-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }
    .post:hover .play-icon {
      opacity: 1;
    }
    .post.is-playing .play-icon {
      opacity: 0;
    }
    .play-icon svg {
      width: 22px;
      height: 22px;
      fill: #f0f0f0;
      margin-left: 3px;
    }
  </style>
</head>
<body>

  <h1>My Instagram Posts</h1>
  <div id="feed" class="grid"></div>
  <p id="status" class="status">Loading posts...</p>

  <script>
    async function loadFeed() {
      const statusEl = document.getElementById('status');
      const feedEl = document.getElementById('feed');

      try {
        // Cache-bust so browsers don't serve a stale copy of the JSON
        const res = await fetch('data/posts.json?_=' + Date.now());
        if (!res.ok) throw new Error('Could not load posts.json');
        const json = await res.json();
        const posts = json.data || [];

        if (posts.length === 0) {
          statusEl.textContent = 'No posts yet — the feed updates automatically once the fetch action has run.';
          return;
        }

        statusEl.remove();

        posts.forEach(post => {
          const isVideo = post.media_type === 'VIDEO';
          let card;

          if (isVideo) {
            // Inline playable video instead of linking out
            card = document.createElement('div');
            card.className = 'post';

            const video = document.createElement('video');
            video.src = post.media_url;
            video.poster = post.thumbnail_url || '';
            video.preload = 'metadata';
            video.playsInline = true;
            video.loop = true;
            card.appendChild(video);

            const playIcon = document.createElement('div');
            playIcon.className = 'play-icon';
            playIcon.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
            card.appendChild(playIcon);

            card.addEventListener('click', () => {
              if (video.paused) {
                video.play();
                card.classList.add('is-playing');
              } else {
                video.pause();
                card.classList.remove('is-playing');
              }
            });
            video.addEventListener('pause', () => card.classList.remove('is-playing'));
          } else {
            // Photos still link out to the post on Instagram
            card = document.createElement('a');
            card.href = post.permalink;
            card.target = '_blank';
            card.rel = 'noopener noreferrer';
            card.className = 'post';

            const img = document.createElement('img');
            img.src = post.media_url;
            img.alt = post.caption ? post.caption.slice(0, 60) : 'Instagram post';
            img.loading = 'lazy';
            card.appendChild(img);
          }

          if (post.caption) {
            const cap = document.createElement('div');
            cap.className = 'caption';
            cap.textContent = post.caption;
            card.appendChild(cap);
          }

          feedEl.appendChild(card);
        });

      } catch (err) {
        statusEl.textContent = 'Could not load the feed right now. Please try again later.';
        console.error(err);
      }
    }

    loadFeed();
  </script>

</body>
