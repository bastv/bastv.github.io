<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Instagram Feed</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
      background: #000;
      color: #d4d4d4;
    }
    h1 {
      text-align: center;
      font-weight: 600;
      color: #f0f0f0;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 30px;
    }
    .post {
      background: #111;
      border: 1px solid #262626;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }
    .post:hover {
      transform: translateY(-3px);
      border-color: #444;
    }
    .post img, .post video {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
    }
    .caption {
      padding: 10px 12px;
      font-size: 0.85rem;
      line-height: 1.3;
      max-height: 3.9em;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #b0b0b0;
    }
    .status {
      text-align: center;
      color: #888;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <h1>My Instagram Posts</h1>
  <div id="feed" class="grid"></div>
  <p id="status" class="status">Loading posts...</p>

  <script>
    async function loadFeed() {
      const statusEl = document.getElementById('status');
      const feedEl = document.getElementById('feed');

      try {
        // Cache-bust so browsers don't serve a stale copy of the JSON
        const res = await fetch('data/posts.json?_=' + Date.now());
        if (!res.ok) throw new Error('Could not load posts.json');
        const json = await res.json();
        const posts = json.data || [];

        if (posts.length === 0) {
          statusEl.textContent = 'No posts yet — the feed updates automatically once the fetch action has run.';
          return;
        }

        statusEl.remove();

        posts.forEach(post => {
          const a = document.createElement('a');
          a.href = post.permalink;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.className = 'post';

          // Videos: show the thumbnail instead of the video file itself
          const imgSrc = post.media_type === 'VIDEO'
            ? (post.thumbnail_url || post.media_url)
            : post.media_url;

          const img = document.createElement('img');
          img.src = imgSrc;
          img.alt = post.caption ? post.caption.slice(0, 60) : 'Instagram post';
          img.loading = 'lazy';
          a.appendChild(img);

          if (post.caption) {
            const cap = document.createElement('div');
            cap.className = 'caption';
            cap.textContent = post.caption;
            a.appendChild(cap);
          }

          feedEl.appendChild(a);
        });

      } catch (err) {
        statusEl.textContent = 'Could not load the feed right now. Please try again later.';
        console.error(err);
      }
    }

    loadFeed();
  </script>

</body>
</html>
